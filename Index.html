<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Information</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --accent: #00b0f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: var(--accent);
            font-size: 2.2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .card h2 {
            color: var(--accent);
            margin-bottom: 18px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .info-row:last-child { border-bottom: none; }
        .label { color: #888; }
        .value { 
            color: #fff; 
            font-weight: 500; 
            text-align: right;
            max-width: 60%;
        }
        .fingerprint {
            font-family: monospace;
            word-break: break-all;
            background: #1a1a1a;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .warning {
            background: #ff9800;
            color: black;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-info-circle"></i> Device & Network Intelligence</h1>
        <p>Real-time System Information</p>
    </div>

    <div class="container" id="dashboard"></div>

    <script>
        async function getIPData() {
            // Try ip-api.com first (more reliable)
            try {
                const res = await fetch("https://ip-api.com/json/?fields=status,message,country,countryCode,region,regionName,city,isp,org,timezone,query");
                const data = await res.json();
                if (data.status === "success") {
                    return {
                        ip: data.query,
                        city: data.city,
                        region: data.regionName,
                        country: data.country,
                        isp: data.isp || data.org,
                        timezone: data.timezone
                    };
                }
            } catch (e) {}

            // Fallback to ipapi.co
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    isp: data.org,
                    timezone: data.timezone
                };
            } catch (e) {}

            return { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Unknown", isp: "Unknown", timezone: "Unknown" };
        }

        async function getFingerprint() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width + screen.height,
                navigator.platform,
                navigator.hardwareConcurrency || "",
                navigator.deviceMemory || ""
            ].join("|");
            
            try {
                const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
                return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, "0")).join("");
            } catch { return "Unavailable"; }
        }

        function getGPUInfo() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                const debug = gl.getExtension("WEBGL_debug_renderer_info");
                return {
                    renderer: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Unavailable",
                    vendor: debug ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : "Unavailable"
                };
            } catch {
                return { renderer: "Unavailable", vendor: "Unavailable" };
            }
        }

        async function initDashboard() {
            const ipData = await getIPData();
            const gpu = getGPUInfo();
            const fingerprint = await getFingerprint();

            let battery = "Unavailable";
            if (navigator.getBattery) {
                try {
                    const b = await navigator.getBattery();
                    battery = Math.round(b.level * 100) + "%";
                } catch {}
            }

            const adBlockTest = () => new Promise(resolve => {
                const ad = document.createElement("div");
                ad.className = "adsbox";
                ad.style.display = "none";
                document.body.appendChild(ad);
                setTimeout(() => {
                    resolve(ad.offsetHeight === 0 ? "Yes" : "No");
                    ad.remove();
                }, 120);
            });

            const adBlocked = await adBlockTest();

            const sections = [
                {
                    title: "📍 Location",
                    data: {
                        "IP Address": ipData.ip || "Unknown",
                        "City": ipData.city || "Unknown",
                        "Region": ipData.region || "Unknown",
                        "Country": ipData.country || "Unknown",
                        "Timezone": ipData.timezone || "Unknown"
                    }
                },
                {
                    title: "🌐 Network",
                    data: {
                        "ISP / Organization": ipData.isp || "Unknown",
                        "Connection": navigator.connection ? `\( {navigator.connection.effectiveType} ( \){navigator.connection.downlink} Mbps)` : "Unknown",
                        "Online": navigator.onLine ? "✅ Yes" : "❌ No"
                    }
                },
                {
                    title: "💻 System",
                    data: {
                        "Device": /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop / Laptop",
                        "Platform": navigator.platform,
                        "CPU Threads": navigator.hardwareConcurrency || "Unknown",
                        "RAM": navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown",
                        "Touch": 'ontouchstart' in window ? "Supported" : "Not Supported"
                    }
                },
                {
                    title: "🖥️ Display & GPU",
                    data: {
                        "Screen Resolution": `${screen.width} × ${screen.height}`,
                        "Window Size": `${window.innerWidth} × ${window.innerHeight}`,
                        "Color Depth": screen.colorDepth + " bit",
                        "GPU Renderer": gpu.renderer,
                        "GPU Vendor": gpu.vendor
                    }
                },
                {
                    title: "🌐 Browser",
                    data: {
                        "Browser": navigator.userAgent.includes("Chrome") ? "Chrome" : navigator.userAgent.includes("Firefox") ? "Firefox" : "Other",
                        "Language": navigator.language,
                        "Cookies": navigator.cookieEnabled ? "Enabled" : "Disabled",
                        "Theme": window.matchMedia('(prefers-color-scheme: dark)').matches ? "Dark" : "Light"
                    }
                }
            ];

            const dashboard = document.getElementById("dashboard");
            dashboard.innerHTML = "";

            sections.forEach(section => {
                let html = `<div class="card"><h2>${section.title}</h2>`;
                Object.entries(section.data).forEach(([key, value]) => {
                    html += `
                        <div class="info-row">
                            <span class="label">${key}</span>
                            <span class="value">${value}</span>
                        </div>`;
                });
                html += `</div>`;
                dashboard.innerHTML += html;
            });

            // Fingerprint Card
            const fpCard = document.createElement("div");
            fpCard.className = "card";
            fpCard.innerHTML = `
                <h2>🔑 Browser Fingerprint</h2>
                <div class="fingerprint">${fingerprint}</div>
            `;
            dashboard.appendChild(fpCard);
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
